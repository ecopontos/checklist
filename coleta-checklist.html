<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operação de Coleta - SATELITE v3</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg: #0b0e14;
            --surface: #161b22;
            --surface2: #1c2128;
            --text: #e6edf3;
            --text-dim: #8b949e;
            --accent: #79c0ff;
            --danger: #ff7b72;
            --success: #3fb950;
            --glass: rgba(22, 27, 34, 0.8);
            --card-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        header {
            background: var(--surface);
            border-bottom: 1px solid var(--card-border);
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-area { display: flex; align-items: center; gap: 15px; }

        .page-nav { display: flex; gap: 12px; flex-wrap: wrap; font-size: 0.85rem; }
        .page-nav a { color: var(--text-dim); text-decoration: none; transition: color 0.3s; }
        .page-nav a:hover { color: var(--primary); }
        .page-nav .active { color: var(--primary); font-weight: 600; }

        .controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 10px;
            align-items: center;
        }

        .search-box {
            position: sticky;
            bottom: 20px;
            z-index: 100;
            margin-top: 30px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .search-box input {
            width: 100%;
            background: #fff;
            color: #000;
            font-weight: 800;
            font-size: 1.5rem;
            padding: 15px 25px;
            border-radius: 20px;
            border: 4px solid var(--primary);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .search-box input::placeholder { color: rgba(0,0,0,0.3); }

        .search-hint {
            position: absolute;
            right: 25px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.8rem;
            background: var(--surface2);
            padding: 6px 12px;
            border-radius: 8px;
            color: var(--text-dim);
            font-weight: 600;
        }

        select, input {
            background: var(--surface2);
            border: 1px solid var(--card-border);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 8px;
            outline: none;
            font-family: inherit;
        }

        .stats-bar {
            background: rgba(255, 255, 255, 0.02);
            padding: 10px 20px;
            display: flex;
            gap: 20px;
            font-size: 0.8rem;
            border-bottom: 1px solid var(--card-border);
        }

        .stat { display: flex; align-items: center; gap: 6px; }
        .stat-val { font-family: 'JetBrains Mono'; color: var(--primary); font-weight: 600; }

        main {
            max-width: 800px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .row-card {
            background: var(--surface);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            display: grid;
            grid-template-columns: 40px 1fr auto;
            gap: 15px;
            align-items: start;
            transition: transform 0.2s, border-color 0.2s;
        }

        .row-card:hover { border-color: var(--secondary); transform: translateX(5px); }
        .row-card.done { border-left: 4px solid var(--success); background: rgba(63, 185, 80, 0.05); }

        .row-num { color: var(--text-dim); font-family: 'JetBrains Mono'; font-size: 0.8rem; padding-top: 4px; }
        .row-info h3 { font-size: 1.1rem; margin-bottom: 4px; }
        .row-info p { font-size: 0.85rem; color: var(--text-dim); }

        .row-inputs {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: flex-end;
        }

        .qty-input { width: 80px; text-align: center; font-size: 1.1rem; font-weight: 600; }
        
        .btn-issue {
            font-size: 0.75rem;
            background: transparent;
            border: 1px dashed var(--card-border);
            color: var(--text-dim);
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
        }
        .btn-issue.active { border-color: var(--danger); color: var(--danger); background: rgba(255, 123, 114, 0.1); }

        .issue-row {
            grid-column: 1 / 4;
            display: none;
            margin-top: 10px;
        }
        .issue-row.open { display: block; }
        .issue-row input { width: 100%; color: var(--danger); border-color: var(--danger); }

        .btn-save {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--success);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            border: none;
            font-weight: 800;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
        }
        .btn-save:hover { transform: scale(1.05); box-shadow: 0 15px 30px rgba(63, 185, 80, 0.4); }

        .empty-state {
            text-align: center;
            padding: 100px 20px;
            color: var(--text-dim);
        }

        #toast {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            background: var(--surface2); color: var(--text);
            padding: 12px 24px; border-radius: 12px; border: 1px solid var(--primary);
            opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }

        .btn-checklist {
            background: transparent;
            border: 1px solid var(--card-border);
            color: var(--text);
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: border-color 0.2s;
        }
        .btn-checklist:hover { border-color: var(--primary); }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-overlay.open { display: flex; }
        .modal-card {
            background: var(--surface);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .modal-card h2 { font-size: 1.3rem; }
        .modal-field { display: flex; flex-direction: column; gap: 6px; }
        .modal-field label { font-size: 0.8rem; color: var(--text-dim); }
        .modal-field input, .modal-field select { width: 100%; }
        .modal-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        .modal-actions button {
            flex: 1;
            min-width: 100px;
            padding: 10px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
        }
        .btn-modal-primary { background: var(--primary); color: #000; }
        .btn-modal-success { background: var(--success); color: #fff; }
        .btn-modal-cancel { background: transparent; border: 1px solid var(--card-border) !important; color: var(--text-dim); }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo-area">
                <h2 style="font-weight: 800; letter-spacing: -1px;">OPERAÇÃO</h2>
                <nav class="page-nav">
                    <a href="index.html">🏠 Início</a>
                    <a href="roteiros.html">📍 Roteiros</a>
                    <span class="active">✅ Coleta</span>
                    <a href="analise.html">📊 Análise</a>
                    <a href="admin.html">⚙️ Admin</a>
                </nav>
            </div>
            <div class="controls">
                <select id="routeSelect">
                    <option value="">Selecione o Roteiro</option>
                </select>
                <input type="date" id="opDate">
                <select id="sortSelect">
                    <option value="ordem">Número de Ordem</option>
                    <option value="alfabetica">Ordem Alfabética</option>
                    <option value="quantidade">Qtd. Digitada</option>
                </select>
                <button class="btn-checklist" id="btnChecklist" type="button">📋 Checklist Próxima Coleta</button>
            </div>
        </div>
    </header>

    <div class="stats-bar">
        <div class="stat">Total: <span class="stat-val" id="s-total">0</span></div>
        <div class="stat">Coletados: <span class="stat-val" id="s-done">0</span></div>
        <div class="stat">Bombonas: <span class="stat-val" id="s-qty">0</span></div>
        <div class="stat">Problemas: <span class="stat-val" id="s-issues">0</span></div>
    </div>

    <main>
        <div id="listContainer">
            <div class="empty-state">
                <h3>Nenhum roteiro selecionado</h3>
                <p>Escolha um roteiro acima para iniciar o checklist.</p>
            </div>
        </div>
        
        <div class="search-box" id="searchBox" style="display: none;">
            <input type="text" id="idSearch" placeholder="DIGITE O ID ROTA..." autocomplete="off">
            <span class="search-hint">⌨️ BUSCAR</span>
        </div>
    </main>

    <button class="btn-save" id="btnSave">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        SALVAR OPERAÇÃO
    </button>

    <div id="toast">Operação salva com sucesso!</div>

    <div class="modal-overlay" id="checklistModal">
        <div class="modal-card">
            <h2>Checklist Próxima Coleta</h2>
            <div class="modal-field">
                <label>Data da Próxima Coleta</label>
                <input type="date" id="proxData">
            </div>
            <div class="modal-field">
                <label>Tipo de Resíduo</label>
                <select id="tipoResiduo">
                    <option value="Vidros">Vidros</option>
                    <option value="Organicos">Orgânicos</option>
                    <option value="Plasticos">Plásticos</option>
                    <option value="Papel e Papelao">Papel e Papelão</option>
                    <option value="Oleo de Cozinha">Óleo de Cozinha</option>
                    <option value="Bombonas">Bombonas</option>
                    <option value="Residuos Solidos">Resíduos Sólidos</option>
                </select>
            </div>
            <div class="modal-field">
                <label>Motorista (opcional)</label>
                <input type="text" id="checklistMotorista" placeholder="Nome do motorista">
            </div>
            <div class="modal-field">
                <label>Veículo (opcional)</label>
                <input type="text" id="checklistVeiculo" placeholder="Placa ou identificação">
            </div>
            <div class="modal-actions">
                <button class="btn-modal-cancel" id="btnChecklistCancel">Cancelar</button>
                <button class="btn-modal-primary" id="btnChecklistDownload">Baixar PDF</button>
                <button class="btn-modal-success" id="btnChecklistSend">Enviar para Drive</button>
            </div>
        </div>
    </div>

    <script type="module">
        import db from './database.js';
        import { pushColetas, sendChecklistToDrive } from './google-sync.js';

        let currentClients = [];
        let sessionData = {}; // id_rota -> { qty, issue }
        let currentSort = 'ordem'; // 'ordem' | 'alfabetica' | 'quantidade'

        async function init() {
            await db.init();
            
            // Set today's date
            document.getElementById('opDate').valueAsDate = new Date();
            
            // Populate routes
            const routes = db.getRoteiros();
            const select = document.getElementById('routeSelect');
            routes.forEach(r => {
                const opt = document.createElement('option');
                opt.value = r.id;
                opt.textContent = r.nome;
                select.appendChild(opt);
            });

            select.onchange = loadRoute;
            document.getElementById('btnSave').onclick = saveOperation;
            document.getElementById('sortSelect').onchange = handleSortChange;

            document.getElementById('btnChecklist').onclick = openChecklistModal;
            document.getElementById('btnChecklistCancel').onclick = closeChecklistModal;
            document.getElementById('btnChecklistDownload').onclick = downloadChecklist;
            document.getElementById('btnChecklistSend').onclick = sendChecklistToDriveHandler;

            // Search logic
            const idSearch = document.getElementById('idSearch');
            idSearch.onkeydown = (e) => {
                if (e.key === 'Enter') {
                    const id = idSearch.value.trim();
                    if (id) focusItem(id);
                }
            };
        }

        function loadRoute() {
            const routeId = document.getElementById('routeSelect').value;
            if (!routeId) {
                renderEmpty();
                document.getElementById('searchBox').style.display = 'none';
                return;
            }

            currentClients = db.getClientesByRoteiro(routeId);
            sessionData = {};
            currentSort = 'ordem';
            document.getElementById('sortSelect').value = 'ordem';
            renderList();

            document.getElementById('searchBox').style.display = 'block';
            // Focus search automatically
            document.getElementById('idSearch').focus();
        }

        function focusItem(id) {
            const client = currentClients.find(c => c.id_rota == id);
            if (!client) {
                // Flash red on error
                const input = document.getElementById('idSearch');
                input.style.borderColor = 'var(--danger)';
                setTimeout(() => input.style.borderColor = 'var(--primary)', 500);
                return;
            }

            renderList(id); // Show ONLY the selected item
            
            setTimeout(() => {
                const qtyInput = document.getElementById(`q-${id}`);
                const issueInput = document.getElementById(`i-${id}`);

                if (qtyInput) {
                    qtyInput.focus();
                    qtyInput.select();
                    
                    // Enter logic for quantity -> focus issue or finish
                    qtyInput.onkeydown = (e) => {
                        if (e.key === 'Enter') {
                            e.preventDefault();
                            if (issueInput && !document.getElementById(`ir-${id}`).classList.contains('open')) {
                                // If issue is closed, just finish
                                finishEntry(id);
                            } else {
                                issueInput.focus();
                            }
                        }
                    };
                }

                if (issueInput) {
                    issueInput.onkeydown = (e) => {
                        if (e.key === 'Enter') {
                            e.preventDefault();
                            finishEntry(id);
                        }
                    };
                }
            }, 50);
        }

        function finishEntry(id) {
            updateEntry(id);
            const searchInput = document.getElementById('idSearch');
            searchInput.value = '';
            renderList(); // Back to full list
            searchInput.focus();
        }

        function renderEmpty() {
            document.getElementById('listContainer').innerHTML = `
                <div class="empty-state">
                    <h3>Nenhum roteiro selecionado</h3>
                    <p>Escolha um roteiro acima para iniciar o checklist.</p>
                </div>
            `;
            updateStats();
        }

        function sortClients(list) {
            const sorted = [...list];
            if (currentSort === 'alfabetica') {
                sorted.sort((a, b) => a.cliente.localeCompare(b.cliente, 'pt-BR'));
            } else if (currentSort === 'quantidade') {
                sorted.sort((a, b) => {
                    const qtyA = (sessionData[a.id_rota] && sessionData[a.id_rota].qty) || 0;
                    const qtyB = (sessionData[b.id_rota] && sessionData[b.id_rota].qty) || 0;
                    if (qtyB !== qtyA) return qtyB - qtyA;
                    return (a.ordem || 0) - (b.ordem || 0);
                });
            } else {
                sorted.sort((a, b) => (a.ordem || 0) - (b.ordem || 0));
            }
            return sorted;
        }

        function handleSortChange() {
            currentSort = document.getElementById('sortSelect').value;
            renderList();
        }

        function renderList(filterId = null) {
            const container = document.getElementById('listContainer');
            if (currentClients.length === 0) {
                container.innerHTML = '<div class="empty-state"><h3>Roteiro sem pontos cadastrados</h3><p>Vá em Gestão de Roteiros para adicionar pontos.</p></div>';
                return;
            }

            const clientsToShow = filterId
                ? currentClients.filter(c => c.id_rota == filterId)
                : sortClients(currentClients);

            container.innerHTML = clientsToShow.map((c, i) => {
                const session = sessionData[c.id_rota] || {};
                const isDone = session.qty > 0;
                const hasIssue = session.issue;

                return `
                <div class="row-card ${isDone ? 'done' : ''}" id="card-${c.id_rota}">
                    <div class="row-num">${c.ordem || i + 1}</div>
                    <div class="row-info">
                        <h3>${c.cliente}</h3>
                        <p>${c.logradouro || ''}, ${c.numero || ''}</p>
                        <p style="font-size: 0.7rem; color: var(--primary); margin-top: 5px;">ID: ${c.id_rota}</p>
                    </div>
                    <div class="row-inputs">
                        <input type="number" class="qty-input" placeholder="0" min="0" 
                            id="q-${c.id_rota}"
                            value="${session.qty || ''}"
                            onchange="updateEntry('${c.id_rota}')">
                        <button class="btn-issue ${hasIssue ? 'active' : ''}" id="bi-${c.id_rota}" onclick="toggleIssue('${c.id_rota}')">
                            ${hasIssue ? '⚠️ Problema' : '+ Problema'}
                        </button>
                    </div>
                    <div class="issue-row ${hasIssue ? 'open' : ''}" id="ir-${c.id_rota}">
                        <input type="text" placeholder="Descreva o problema..." id="i-${c.id_rota}" 
                            value="${session.issue || ''}"
                            oninput="updateEntry('${c.id_rota}')">
                    </div>
                </div>
                `;
            }).join('');

            // If we are showing the full list, add a button to clear the view if it was filtered
            if (!filterId && currentClients.length > 0) {
                // Keep it clean
            }
            
            updateStats();
        }

        window.updateEntry = (id) => {
            const qty = parseInt(document.getElementById(`q-${id}`).value) || 0;
            const issue = document.getElementById(`i-${id}`).value;
            
            sessionData[id] = { qty, issue };
            
            const card = document.getElementById(`card-${id}`);
            if (qty > 0) card.classList.add('done');
            else card.classList.remove('done');
            
            updateStats();
        };

        window.toggleIssue = (id) => {
            const ir = document.getElementById(`ir-${id}`);
            const bi = document.getElementById(`bi-${id}`);
            ir.classList.toggle('open');
            bi.classList.toggle('active');
        };

        function updateStats() {
            const total = currentClients.length;
            let done = 0;
            let totalQty = 0;
            let issues = 0;

            Object.values(sessionData).forEach(d => {
                if (d.qty > 0) done++;
                totalQty += d.qty;
                if (d.issue && d.issue.trim() !== '') issues++;
            });

            document.getElementById('s-total').textContent = total;
            document.getElementById('s-done').textContent = done;
            document.getElementById('s-qty').textContent = totalQty;
            document.getElementById('s-issues').textContent = issues;
        }

        async function saveOperation() {
            const date = document.getElementById('opDate').value;
            if (!date) { alert('Selecione a data!'); return; }

            const entries = Object.entries(sessionData).filter(([id, d]) => d.qty > 0 || d.issue);

            if (entries.length === 0) { alert('Nenhum registro para salvar!'); return; }

            const routeSelect = document.getElementById('routeSelect');
            const roteiroNome = routeSelect.options[routeSelect.selectedIndex]
                ? routeSelect.options[routeSelect.selectedIndex].textContent
                : '';

            const savedColetas = entries.map(([id, d]) => {
                const client = currentClients.find(c => c.id_rota == id);
                const localId = db.addColeta({
                    id_rota: id,
                    data: date,
                    quantidade: d.qty,
                    intercorrencia: d.issue || ''
                });
                return {
                    id: localId,
                    id_rota: id,
                    data: date,
                    quantidade: d.qty,
                    intercorrencia: d.issue || '',
                    cliente: client ? client.cliente : '',
                    roteiro: roteiroNome,
                    sync_id: crypto.randomUUID()
                };
            });

            showToast();
            syncColetasToSheet(savedColetas);
        }

        async function syncColetasToSheet(coletas) {
            const result = await pushColetas(coletas);
            if (result.ok) {
                coletas.forEach(c => db.markColetaSynced(c.id, c.sync_id));
            } else {
                showToast('Salvo localmente. Sincronização pendente.');
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            const defaultMsg = 'Operação salva com sucesso!';
            t.textContent = msg || defaultMsg;
            t.style.opacity = '1';
            setTimeout(() => {
                t.style.opacity = '0';
                t.textContent = defaultMsg;
            }, 3000);
        }

        function openChecklistModal() {
            if (!document.getElementById('routeSelect').value) {
                alert('Selecione um roteiro primeiro');
                return;
            }
            document.getElementById('proxData').value = '';
            document.getElementById('checklistModal').classList.add('open');
        }

        function closeChecklistModal() {
            document.getElementById('checklistModal').classList.remove('open');
        }

        function formatDateBR(dateStr) {
            if (!dateStr) return '____/____/________';
            const parts = dateStr.split('-');
            if (parts.length !== 3) return dateStr;
            return `${parts[2]}/${parts[1]}/${parts[0]}`;
        }

        function buildChecklistDoc() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });

            const routeSelect = document.getElementById('routeSelect');
            const roteiroNome = routeSelect.options[routeSelect.selectedIndex]
                ? routeSelect.options[routeSelect.selectedIndex].textContent
                : '';
            const dataColeta = document.getElementById('opDate').value;
            const proxData = document.getElementById('proxData').value;
            const tipoResiduo = document.getElementById('tipoResiduo').value;
            const motorista = document.getElementById('checklistMotorista').value.trim();
            const veiculo = document.getElementById('checklistVeiculo').value.trim();

            let totalPrevisto = 0;
            const rows = currentClients.map((c, i) => {
                const session = sessionData[c.id_rota] || {};
                const qty = session.qty > 0 ? session.qty : '';
                if (session.qty > 0) totalPrevisto += session.qty;
                return [
                    c.ordem || (i + 1),
                    c.cliente,
                    c.logradouro || '',
                    c.numero || '',
                    c.cep || '',
                    c.id_rota,
                    qty,
                    '',
                    session.issue || ''
                ];
            });

            doc.setFontSize(16);
            doc.text(`Checklist Coleta ${roteiroNome}`, 14, 15);
            doc.setFontSize(9);
            doc.text(`Data da Coleta: ${formatDateBR(dataColeta)}   Proxima Coleta: ${formatDateBR(proxData)}`, 14, 22);
            doc.text(`Tipo de Residuo: ${tipoResiduo}   Total de Pontos: ${currentClients.length}   Bombonas Previstas: ${totalPrevisto}`, 14, 27);
            if (motorista) doc.text(`Motorista: ${motorista}`, 14, 32);
            if (veiculo) doc.text(`Veiculo: ${veiculo}`, 100, 32);

            doc.autoTable({
                startY: 36,
                head: [['Ord.', 'Cliente', 'Logradouro', 'No', 'CEP', 'ID', 'Bomb. Qtd.', 'Qtd. Coletada', 'Problema']],
                body: rows,
                styles: { fontSize: 8 },
                headStyles: { fillColor: [26, 58, 92] }
            });

            const finalY = doc.lastAutoTable.finalY + 20;
            doc.text('_______________________', 30, finalY);
            doc.text('Motorista', 55, finalY + 5);
            doc.text('_______________________', 180, finalY);
            doc.text('Supervisor', 205, finalY + 5);

            const filename = `Checklist_${roteiroNome}_${proxData || 'sem-data'}.pdf`;

            return { doc, filename, proxData };
        }

        function downloadChecklist() {
            const { doc, filename } = buildChecklistDoc();
            doc.save(filename);
        }

        async function sendChecklistToDriveHandler() {
            const proxData = document.getElementById('proxData').value;
            if (!proxData) {
                alert('Preencha a Data da Proxima Coleta para enviar ao Drive.');
                return;
            }

            const { doc, filename } = buildChecklistDoc();
            const dataUri = doc.output('datauristring');
            const pdfBase64 = dataUri.split(',')[1];

            const result = await sendChecklistToDrive(filename, pdfBase64);
            if (result.ok) {
                alert('Checklist enviado para o Drive com sucesso!');
                closeChecklistModal();
            } else {
                alert(`Falha ao enviar: ${result.error || 'erro desconhecido'}`);
            }
        }

        init();
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
    <script src="vendor/jspdf.umd.min.js"></script>
    <script src="vendor/jspdf.plugin.autotable.min.js"></script>
</body>
